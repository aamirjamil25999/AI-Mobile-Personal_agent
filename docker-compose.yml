services:
  postgres:
    image: postgres:16-alpine
    container_name: my-phone-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_phone_agent
    ports:
      - "5432:5432"
    volumes:
      - my_phone_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_phone_agent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  my_phone_agent_pgdata:
