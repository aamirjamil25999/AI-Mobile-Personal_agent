<svg width="1880" height="1860" viewBox="0 0 1880 1860" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220" />
      <stop offset="100%" stop-color="#1C3559" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182845" />
      <stop offset="100%" stop-color="#13213A" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5A8" />
      <stop offset="100%" stop-color="#35A6FF" />
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6A6A" />
      <stop offset="100%" stop-color="#FF9A5C" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.35" />
    </filter>
    <style>
      .h1 { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #EAF2FF; }
      .sub { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #9EB3CC; }
      .title { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #EAF2FF; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #B6C7DC; }
      .body { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #8FA6C2; }
      .strong { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #EAF2FF; }
      .btn { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #041326; }
      .tiny { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #C9D8E8; }
      .caption { font: 600 19px 'Segoe UI', Arial, sans-serif; fill: #D5DFEA; }
    </style>
  </defs>

  <rect width="1880" height="1860" fill="#0D1117" />
  <text x="44" y="62" class="h1">My Phone Agent - UI Board v2 (8 Screens)</text>
  <text x="44" y="90" class="sub">Android personal-agent flow in Command Center style</text>

  <!-- Screen 1: Onboarding -->
  <g transform="translate(50,130)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="url(#bg)" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <circle cx="195" cy="162" r="46" fill="url(#accent)" />
    <text x="195" y="171" text-anchor="middle" style="font:800 30px 'Segoe UI',Arial,sans-serif; fill:#041326;">C</text>

    <text x="195" y="245" text-anchor="middle" class="title">Meet Your Phone Agent</text>
    <text x="195" y="274" text-anchor="middle" class="body">Calls, messages, emails, settings</text>
    <text x="195" y="295" text-anchor="middle" class="body">all with secure approvals.</text>

    <rect x="42" y="332" width="306" height="62" rx="14" fill="url(#card)" />
    <text x="60" y="365" class="strong">- Talk naturally in Hinglish</text>

    <rect x="42" y="406" width="306" height="62" rx="14" fill="url(#card)" />
    <text x="60" y="439" class="strong">- Automate daily mobile workflows</text>

    <rect x="42" y="480" width="306" height="62" rx="14" fill="url(#card)" />
    <text x="60" y="513" class="strong">- Biometric safety for risky actions</text>

    <rect x="42" y="670" width="306" height="56" rx="14" fill="url(#accent)" />
    <text x="195" y="705" text-anchor="middle" class="btn">Get Started</text>
  </g>
  <text x="160" y="954" class="caption">1. Onboarding</text>

  <!-- Screen 2: Home -->
  <g transform="translate(490,130)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Command Center</text>
    <text x="52" y="111" class="body">Agent Online  |  Personal Mode</text>

    <rect x="42" y="128" width="306" height="62" rx="14" fill="#1A2741" />
    <text x="58" y="164" class="body">Type or speak a command...</text>
    <circle cx="314" cy="159" r="17" fill="url(#accent)" />

    <text x="50" y="225" class="label">Quick Actions</text>
    <rect x="42" y="239" width="146" height="62" rx="14" fill="#182740" />
    <rect x="202" y="239" width="146" height="62" rx="14" fill="#182740" />
    <rect x="42" y="313" width="146" height="62" rx="14" fill="#182740" />
    <rect x="202" y="313" width="146" height="62" rx="14" fill="#182740" />
    <text x="60" y="276" class="strong">Call</text>
    <text x="220" y="276" class="strong">Message</text>
    <text x="60" y="350" class="strong">Email</text>
    <text x="220" y="350" class="strong">Settings</text>

    <text x="50" y="417" class="label">Automations</text>
    <rect x="42" y="431" width="306" height="78" rx="14" fill="#16243C" />
    <text x="60" y="462" class="strong">Morning Routine</text>
    <text x="60" y="484" class="body">8:00 AM - Weather + Calendar + Focus</text>

    <text x="50" y="540" class="label">Recent Activity</text>
    <rect x="42" y="554" width="306" height="54" rx="12" fill="#16243C" />
    <rect x="42" y="620" width="306" height="54" rx="12" fill="#16243C" />
    <text x="60" y="586" class="tiny">SMS sent to Rahul  |  2m ago</text>
    <text x="60" y="652" class="tiny">Email draft waiting approval</text>

    <rect x="42" y="706" width="306" height="42" rx="12" fill="#1B2A43" />
    <text x="64" y="733" class="tiny">Home   |   Automations   |   Activity   |   Settings</text>
  </g>
  <text x="640" y="954" class="caption">2. Home</text>

  <!-- Screen 3: Command Execute -->
  <g transform="translate(930,130)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Command Execution</text>
    <text x="52" y="111" class="body">Task: Send follow-up email to team</text>

    <rect x="42" y="134" width="306" height="84" rx="14" fill="#19314A" />
    <text x="58" y="165" class="tiny">You: Draft mail to dev team about sprint delay</text>
    <text x="58" y="188" class="tiny">by 30 mins and ask updated ETA.</text>

    <rect x="42" y="230" width="306" height="156" rx="14" fill="#16243C" />
    <text x="58" y="261" class="label">Agent Plan</text>
    <text x="58" y="287" class="tiny">1. Identify recipients from last thread</text>
    <text x="58" y="310" class="tiny">2. Draft concise professional update</text>
    <text x="58" y="333" class="tiny">3. Ask for final approval before send</text>
    <rect x="58" y="350" width="210" height="8" rx="4" fill="#2B3F5A" />
    <rect x="58" y="350" width="145" height="8" rx="4" fill="url(#accent)" />

    <rect x="42" y="398" width="306" height="170" rx="14" fill="#1A2741" />
    <text x="58" y="429" class="label">Draft Preview</text>
    <text x="58" y="453" class="body">Subject: Sprint update and ETA request</text>
    <text x="58" y="477" class="body">Hi team, we are running 30 mins late due to</text>
    <text x="58" y="499" class="body">integration testing. Please share updated ETA.</text>
    <text x="58" y="521" class="body">Thanks.</text>

    <rect x="42" y="582" width="306" height="56" rx="12" fill="url(#accent)" />
    <text x="195" y="617" text-anchor="middle" class="btn">Approve and Send</text>

    <rect x="42" y="648" width="306" height="44" rx="12" fill="#1B2A43" />
    <text x="195" y="676" text-anchor="middle" class="tiny">Edit Draft</text>
  </g>
  <text x="1025" y="954" class="caption">3. Command Execute</text>

  <!-- Screen 4: Automation Builder -->
  <g transform="translate(1370,130)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Automation Builder</text>
    <text x="52" y="111" class="body">Create a new flow in under 1 minute</text>

    <text x="50" y="152" class="label">Trigger</text>
    <rect x="42" y="165" width="306" height="52" rx="12" fill="#1A2741" />
    <text x="58" y="197" class="tiny">When missed call from selected contacts</text>

    <text x="50" y="245" class="label">Action</text>
    <rect x="42" y="258" width="306" height="90" rx="12" fill="#1A2741" />
    <text x="58" y="288" class="tiny">1. Send polite auto SMS</text>
    <text x="58" y="312" class="tiny">2. Create reminder after 15 minutes</text>
    <text x="58" y="336" class="tiny">3. Log event in Activity feed</text>

    <text x="50" y="382" class="label">Schedule Window</text>
    <rect x="42" y="395" width="146" height="52" rx="12" fill="#1A2741" />
    <rect x="202" y="395" width="146" height="52" rx="12" fill="#1A2741" />
    <text x="58" y="427" class="tiny">Start: 09:00</text>
    <text x="218" y="427" class="tiny">End: 20:00</text>

    <text x="50" y="480" class="label">Safety</text>
    <rect x="42" y="493" width="306" height="66" rx="12" fill="#16243C" />
    <text x="58" y="525" class="tiny">Require approval for new contacts</text>
    <rect x="298" y="517" width="34" height="20" rx="10" fill="#00D191" />
    <circle cx="316" cy="527" r="7" fill="#041326" />

    <rect x="42" y="584" width="306" height="56" rx="12" fill="url(#accent)" />
    <text x="195" y="619" text-anchor="middle" class="btn">Save Automation</text>

    <rect x="42" y="650" width="306" height="44" rx="12" fill="#1B2A43" />
    <text x="195" y="678" text-anchor="middle" class="tiny">Test Run</text>
  </g>
  <text x="1453" y="954" class="caption">4. Automation Builder</text>

  <!-- Screen 5: Activity -->
  <g transform="translate(50,980)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Activity Timeline</text>
    <text x="52" y="111" class="body">All actions are auditable and searchable</text>

    <rect x="42" y="130" width="96" height="36" rx="10" fill="#20304B" />
    <rect x="148" y="130" width="96" height="36" rx="10" fill="#1A2741" />
    <rect x="254" y="130" width="94" height="36" rx="10" fill="#1A2741" />
    <text x="66" y="153" class="tiny">All</text>
    <text x="173" y="153" class="tiny">Success</text>
    <text x="282" y="153" class="tiny">Pending</text>

    <rect x="42" y="182" width="306" height="82" rx="12" fill="#16243C" />
    <text x="58" y="214" class="strong">Call placed to Ankit</text>
    <text x="58" y="238" class="body">Today, 09:12 AM  |  Duration: 03:48</text>

    <rect x="42" y="276" width="306" height="82" rx="12" fill="#16243C" />
    <text x="58" y="308" class="strong">Email sent to Design Team</text>
    <text x="58" y="332" class="body">Today, 08:41 AM  |  Approval used</text>

    <rect x="42" y="370" width="306" height="82" rx="12" fill="#16243C" />
    <text x="58" y="402" class="strong">Automation triggered</text>
    <text x="58" y="426" class="body">Morning routine completed in 18 sec</text>

    <rect x="42" y="464" width="306" height="82" rx="12" fill="#16243C" />
    <text x="58" y="496" class="strong">SMS failed to send</text>
    <text x="58" y="520" class="body">No network, retry queued</text>

    <rect x="42" y="706" width="306" height="42" rx="12" fill="#1B2A43" />
    <text x="64" y="733" class="tiny">Home   |   Automations   |   Activity   |   Settings</text>
  </g>
  <text x="194" y="1804" class="caption">5. Activity</text>

  <!-- Screen 6: Settings -->
  <g transform="translate(490,980)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Settings</text>
    <text x="52" y="111" class="body">Security-first configuration</text>

    <text x="50" y="148" class="label">Security</text>
    <rect x="42" y="160" width="306" height="68" rx="12" fill="#16243C" />
    <text x="58" y="191" class="tiny">Biometric approval required</text>
    <rect x="298" y="183" width="34" height="20" rx="10" fill="#00D191" />
    <circle cx="316" cy="193" r="7" fill="#041326" />

    <rect x="42" y="238" width="306" height="68" rx="12" fill="#16243C" />
    <text x="58" y="269" class="tiny">Pin lock for app open</text>
    <rect x="298" y="261" width="34" height="20" rx="10" fill="#00D191" />
    <circle cx="316" cy="271" r="7" fill="#041326" />

    <text x="50" y="338" class="label">Plugins and Tools</text>
    <rect x="42" y="350" width="306" height="96" rx="12" fill="#16243C" />
    <text x="58" y="381" class="tiny">Phone, SMS, Email, Calendar, Files</text>
    <text x="58" y="404" class="body">Permission health: 5/5 connected</text>
    <text x="58" y="427" class="body">Tap to manage access scope</text>

    <text x="50" y="478" class="label">Emergency</text>
    <rect x="42" y="490" width="306" height="62" rx="12" fill="#2B2030" />
    <text x="58" y="526" class="strong">Pause all automations now</text>

    <rect x="42" y="584" width="306" height="56" rx="12" fill="url(#accent)" />
    <text x="195" y="619" text-anchor="middle" class="btn">Save Preferences</text>

    <rect x="42" y="706" width="306" height="42" rx="12" fill="#1B2A43" />
    <text x="64" y="733" class="tiny">Home   |   Automations   |   Activity   |   Settings</text>
  </g>
  <text x="642" y="1804" class="caption">6. Settings</text>

  <!-- Screen 7: Approval -->
  <g transform="translate(930,980)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Approval Required</text>
    <text x="52" y="111" class="body">Sensitive action needs your consent</text>

    <rect x="42" y="136" width="306" height="214" rx="14" fill="#17243C" />
    <text x="58" y="168" class="label">Action</text>
    <text x="58" y="193" class="strong">Enable Airplane Mode</text>
    <text x="58" y="232" class="label">Reason</text>
    <text x="58" y="257" class="tiny">User asked to disable all connectivity</text>
    <text x="58" y="296" class="label">Risk Level</text>
    <rect x="134" y="282" width="74" height="24" rx="12" fill="#FFBC42" />
    <text x="171" y="299" text-anchor="middle" style="font:700 12px 'Segoe UI',Arial,sans-serif; fill:#2A1A00;">MEDIUM</text>

    <rect x="42" y="366" width="306" height="72" rx="12" fill="#1A2741" />
    <text x="58" y="399" class="tiny">Authenticate using fingerprint</text>
    <text x="58" y="421" class="body">Then action will execute once.</text>

    <rect x="42" y="456" width="306" height="56" rx="12" fill="url(#accent)" />
    <text x="195" y="491" text-anchor="middle" class="btn">Approve Action</text>

    <rect x="42" y="524" width="306" height="56" rx="12" fill="#1C2A42" />
    <text x="195" y="559" text-anchor="middle" class="strong">Cancel</text>
  </g>
  <text x="1060" y="1804" class="caption">7. Approval</text>

  <!-- Screen 8: Error State -->
  <g transform="translate(1370,980)" filter="url(#shadow)">
    <rect width="390" height="790" rx="42" fill="#0B1220" stroke="#2A3B53" stroke-width="3" />
    <rect x="20" y="24" width="350" height="742" rx="30" fill="#121C2E" />
    <rect x="162" y="36" width="66" height="8" rx="4" fill="#3A4B66" />

    <text x="52" y="86" class="title">Action Failed</text>
    <text x="52" y="111" class="body">Agent could not complete task safely</text>

    <rect x="42" y="136" width="306" height="208" rx="14" fill="#291F30" />
    <rect x="58" y="160" width="274" height="40" rx="10" fill="url(#danger)" />
    <text x="195" y="186" text-anchor="middle" style="font:700 14px 'Segoe UI',Arial,sans-serif; fill:#210F0B;">Network unavailable</text>
    <text x="58" y="232" class="tiny">Task: Send message to Neha</text>
    <text x="58" y="255" class="tiny">Cause: No mobile data and Wi-Fi off</text>
    <text x="58" y="278" class="tiny">Safe fallback: queued for retry</text>
    <text x="58" y="311" class="body">Next auto retry in 02:00</text>

    <rect x="42" y="362" width="306" height="56" rx="12" fill="url(#accent)" />
    <text x="195" y="397" text-anchor="middle" class="btn">Retry Now</text>

    <rect x="42" y="430" width="306" height="56" rx="12" fill="#1C2A42" />
    <text x="195" y="465" text-anchor="middle" class="strong">Open Network Settings</text>

    <rect x="42" y="498" width="306" height="56" rx="12" fill="#1C2A42" />
    <text x="195" y="533" text-anchor="middle" class="strong">Dismiss</text>

    <rect x="42" y="590" width="306" height="114" rx="12" fill="#16243C" />
    <text x="58" y="623" class="label">Debug Details</text>
    <text x="58" y="647" class="body">error_code: SMS_NET_002</text>
    <text x="58" y="670" class="body">trace_id: PA-2026-05-23-7781</text>
    <text x="58" y="693" class="body">safe_mode: enabled</text>
  </g>
  <text x="1493" y="1804" class="caption">8. Error State</text>
</svg>
